name: test

on: [push]

permissions: read-all

jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: code
        uses: actions/checkout@v4

      - name: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.26

      - name: test
        env:
          GOEXPERIMENT: jsonv2
        run: go test ./...

      - name: test-build-help
        env:
          GOEXPERIMENT: jsonv2
        run: |
          go build ./cmd/apple-ads
          apple-ads -h
          apple-ads stats campaigns -h
          apple-ads stats adgroups -h
          apple-ads stats keywords -h
          apple-ads stats searchterms -h
          apple-ads timeline -h
          apple-ads merge-csv -h
          apple-ads get update-commands-csv -h
          apple-ads analyse discovery -h
          apple-ads analyse cannibalisation -h
          apple-ads analyse language-mismatch -h
